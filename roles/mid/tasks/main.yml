#  yum: name=epel-release state=latest

- name: sync mid
  synchronize:
    src: "{{ item }}"
    dest: "{{ REMOTE_PATH }}"
    owner: true
    group: true
    recursive: yes
  with_items:
  - "node_exporter"
  - "consul"
  - "ilogtail"

- name: add consul link
  shell: ln -sf "{{ REMOTE_PATH }}"/consul/consul "{{ BIN_DIR}}"

- name: sync mid script
  template:
    src: "{{ item }}"
    dest: "{{ REMOTE_PATH }}/{{ item }}"
    owner: "ops"
    group: "ops"
    mode: "0755"
  with_items:
  - "consul/start-consul-agent.sh"

- name: 注册变量ilogtail
  shell: "ps aux | grep /usr/local/ilogtail/ilogtail | grep -v grep"
  register: ilogtail
  ignore_errors: yes

- name: exec script
  shell: "{{ REMOTE_PATH }}/{{ item }}"
  with_items:
  - "ilogtail/install-ilogtail.sh"
  when: '"/usr/local/ilogtail/ilogtail" not in ilogtail.stdout'

- import_tasks: centos-7.yml
  when: ansible_distribution == "CentOS" and ansible_distribution_version == "7"

- import_tasks: centos-6.yml
  when: ansible_distribution == "CentOS" and ansible_distribution_version == "6"

- name: sync mid script 
  template:
    src: "{{ item }}"
    dest: "{{ REMOTE_PATH }}/{{ item }}"
    owner: "ops"
    group: "ops"
  with_items:
  - "node_exporter/node_exporter.service"

- name: add node_exporter service
  shell: ln -sf "{{ REMOTE_PATH }}/{{ item }}" /etc/systemd/system/node_exporter.service
  with_items:
  - "node_exporter/node_exporter.service"

- name: sync mid
  synchronize:
    src: "{{ item }}"
    dest: "{{ REMOTE_PATH }}"
    owner: true
    group: true
    recursive: yes
  with_items:
  - "jaeger"
  - "arthas"

- import_tasks: centos-7.yml
  when: ansible_distribution == "CentOS" and ansible_distribution_version == "7"

